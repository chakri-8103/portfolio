<div class="timeline" @timelineIn>
  <article class="timeline-item" *ngFor="let item of experiences">
    <div class="dot"></div>
    <div class="timeline-card">
      <p class="duration">{{ item.duration }}</p>
      <h3>{{ item.title }}</h3>
      <h4>{{ item.company }}</h4>
      <p class="summary">{{ item.summary }}</p>
      <ul>
        <li *ngFor="let point of item.highlights">{{ point }}</li>
      </ul>
    </div>
  </article>
</div>
